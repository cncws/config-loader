# 基础配置文件
active: dev

app:
  name: MyApp
  version: 1.0.0
  debug: false
  log_level: INFO

db:
  host: localhost
  port: 3306
  user: root
  password: ${DB_PASSWORD:-password123}
  database: ${DB_NAME:-myapp}

redis:
  host: ${REDIS_HOST:-localhost}
  port: 6379
  db: 0

server:
  host: 0.0.0.0
  port: ${SERVER_PORT:-8080}
  env: ${RUN_ENV:-prod}
